name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: aikun-claude-manager-windows
            ext: .exe
          - os: macos-latest
            artifact: aikun-claude-manager-macos
            ext: ''
          - os: ubuntu-latest
            artifact: aikun-claude-manager-linux
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --noconsole --name "aikun-claude-manager" --add-data="ui;ui" --add-data="logo.png;." --icon=logo.ico main.py
        shell: cmd

      - name: Build (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --onefile --noconsole --name "aikun-claude-manager" --add-data="ui:ui" --add-data="logo.png:." main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *"windows"* ]]; then
              zip -r "../${name}.zip" "$dir"
            else
              tar -czf "../${name}.tar.gz" "$dir"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aikun-claude-manager-*.zip
            aikun-claude-manager-*.tar.gz
          generate_release_notes: true
